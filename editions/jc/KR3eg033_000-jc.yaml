body:
  text: 辨溫疫初起氣色舌神脈溫疫邪從胃達外臭氣蒸騰如腐敗風寒從表入里初起內無鬱蒸故無臭氣必待傳陽明而後有汗屁之臭溫疫吸自口鼻初起從中達外便在陽明即有臭氣觸人也望其面色如煙燻垢晦油紅非一派邪熱蒸淫津液上溢於面油紅者陽氣勝垢晦者濕濁盛也更觀其舌必多苔白如積粉黃如埃風寒在表舌多無苔即有白苔亦薄而滑漸傳入里方黃而燥燥而黑溫疫一見頭痛發熱舌即有厚白苔或如積粉或兼淡黃又有苔白即燥或灰黃而燥此皆溫疫初起之舌所當詳辨神識瞀亂如酣醉煩躁胸痞悶即來風寒初起神情清楚及至傳裡始見神昏若溫疫初起即便瞀亂如醉問其所苦而不自知也其脈不浮而但數或見模糊勿疑猜風寒初起其脈多浮溫疫初起其脈必數亦有模糊不清者沉遲莫作陰寒看數而無力非虛災鄭氏曰溫疫初起脈沉遲勿作陰寒斷沉者邪在裡也遲者邪在陰分也或數而無力亦勿作虛視緣熱蒸氣散不能鼓指也但辨其氣色神形舌合溫疫者即依疫法施治無疑氣色舌神明辨的溫疫入手理無違氣色舌神脈五者辨之既明知為溫疫而非傷寒則凡於頭疼發熱諸表證不得誤用辛溫發散於諸里證當清當下者則清之下之而無疑惑矣辨溫疫與風寒異治風寒以溫散為先羌活紫蘇荊芥防風之類時疫以涼解為要薄荷牛蒡豆豉葛根之類風寒攻下不厭遲風寒從表入里直待裡熱裡實方可清涼攻下若下之早反引表邪內陷而成結胸痞利等症時疫攻下不厭早溫疫雖有表症不得誤用辛溫發散於諸里證當清當下者當即用之傷寒汗不厭早下不厭遲溫疫則反是古但有溫證禁汗之戒而無禁下之律可考也蓋時疫邪氣自里出表其氣屬熱故可早清早下若必待痞燥實堅全而後下之必致斑衄狂喘昏沉厥逆之險矣醫者可不知之乎辨溫疫兼風時疫兼風表證同噴嚏咳嗽此為風初起頭痛發熱惡寒鼻塞噴嚏咳嗽是傷風之見證與時證傷風無異也因其脈亦多浮象風寒之脈多浮前胡桔梗荊芥防風蘇葉杏仁松疫證兼寒能令病勢增重兼風反令病勢輕鬆因寒主收束風主疏泄之故辨溫疫兼寒時疫兼寒散表先頭痛發熱惡寒全脈浮而數知為表時疫之脈但數不浮若兼風寒必兼浮脈蘇葉荊芥羌活防風柴胡葛根拈寒重只須敗毒散寒重疫輕者無汗而惡寒盛煩躁輕者可用之疫重加入達原飲宣疫重寒輕者煩躁口臭證多無汗惡寒證少但取蘇荊羌防柴葛一二味加入達原飲中可也辨溫疫兼暑時疫兼暑惟長夏時疫兼寒兼風四時皆有若兼暑則惟長夏有之也脈細弦濡多吐瀉弦細芤濡暑脈也吐瀉傷於暑濕也藿茹湯平胃散或四苓散燥脾利水隨宜寫吐瀉煩渴舌苔黃方為兼疫無假借長夏吐瀉傷於暑濕為多必煩渴苔黃有熱象者方為兼疫辨溫疫兼瘧時疫兼瘧有三種說與君家須記誦似瘧寒熱無定時達原飲內柴胡供邪伏膜原欲達不達欲陷不陷故見半表裡證寒熱無定時一日或一次或二三次故曰似瘧宜達原加柴胡治之時疫轉瘧屬餘邪參胡三白湯為佳似瘧在時疫證前屬實疫後轉瘧虛中夾痰實也時疫兼瘧最難治吳氏書中頗詳議見疫當清當下之疫退治瘧斯無弊吳又可溫疫論云瘧疾二三發或七八發後忽然晝夜發熱煩渴不惡寒舌生苔刺心腹痞滿飲食不進下證漸具此時疫已著瘧疾隱也用疫法治之時疫晝夜純熱胸腹痞滿飲食不進下後脈靜身涼或間日或每日時惡寒而復發熱如期者此溫疫解而瘧邪未盡也以瘧法治之辨溫疫兼痢春夏之交時疫起下痢紅白為疫痢發熱頭痛表裡兼人參敗毒加陳米不但香連不可加淡滲分利亦須忌發熱頭痛為表下痢為里表裡同病法當先解其表表解而里自和多有不治痢而痢自愈者古人於疫痢初起專主倉廩湯即敗毒散加陳倉米疫痢初起不但香連芍藥治痢之藥不可用即二苓澤瀉淡滲分利之品亦不可施之表證未解之先也若夫疫毒勢如焚下痢純紅或純紫煩躁熱渴或昏譫芩連大黃急煎餌又不可拘先表后里之法也辨溫疫夾痰時疫夾痰痰熱燔痰能生熱熱生痰竹油栝蔞貝母牛黃等清火消痰見一斑時疫夾痰其熱愈甚治法大略相同但治疫法中加栝蔞竹瀝貝母薑汁甚則神昏加牛黃辨溫疫夾水水即飲也時疫夾水證如何滿悶心胸常欲摩以手按之無硬痛揉之漉漉響聲過水在胸膈心下雖滿按之不硬揉之漉漉有聲不比結胸硬滿手不可按為辨脈遲而緩舌苔白與疫相違治莫訛時疫之脈必數而夾水之脈反見遲緩治法亦異不可不辨即見昏狂將化燥舌仍白潤渴無多時疫化燥苔必黃黑若水在胸膈即見昏狂諸證而舌仍白膩口不甚渴間有轉黃見黑者半邊中段白仍鋪時疫夾水化燥間有苔轉黃黑者然必仍有白苔或滿舌黃黑半邊夾一二條或舌尖舌本俱黃中夾一段白色此時疫夾水舌之辨也二陳湯平胃散四苓散輩淡滲辛通兩法和時疫夾水雖有表證脈不宜純用辛涼散表純用辛涼表必不解轉增沉困雖有里證不可遽用苦寒清裡早用苦寒里必不除轉加昏憒此水氣鬱遏熱邪宜於散解清裡藥中加辛燥利水理氣之品以祛水氣水氣去鬱熱得發然後議清議攻施無不效矣如蒼朮厚朴半夏茯苓之類皆必用之藥余加芫花大戟甘遂乃千中一試耳辨溫疫夾食時疫恆多夾食成在腸在胃在膈辨須明胃宜消導腸宜下在膈須將吐法行溫邪夾食在胃但須枳樸以消之在腸則用硝黃以下之胃腸俱實大承氣胃多腸少小承氣胃少腸多調胃承氣若食填胸膈未入於胃則宜吐之為捷也食填胸膈最難辨往往肢寒脈反沉但察胸痞苔黃白急將枳實桔梗菔萊菔子楂山楂烹誤投溫劑邪深入必致凶危煩躁增食填胸膈陽氣不得越達往往脈沉肢冷若誤認三陰投以溫劑必致躁煩倍增然仍無熱渴見象若一誤再誤必危蓋食填胸膈氣閉熱鬱故外無大熱口不甚渴此時但察其色氣神舌為疫證急於治疫方中加消食之藥甚則用吐法以宣之使之氣通熱達然後當表則表當清則清自無誤治矣辨溫疫夾郁平時氣鬱感時溫痞嘔肢寒脈亦沉郁屬無形胸可按不同夾食滿而疼夾郁之證痞滿嘔逆手足冷而脈沉頗類夾食但夾食胸滿痛不可按而夾鬱則胸膈痞悶串痛而可按夾食舌苔厚厚白微黃夾郁舌苔薄薄白舒郁必疏通郁金貝母香附蘇梗屬疫邪夾郁先宜疏通其鬱如鬱金貝母香附蘇梗之屬然後解表清裡自無不效矣辨溫疫夾血及蓄血蓄血結於時疫後熱邪傳裡與血相結而後蓄血夾血傷於時疫先先有內傷後感時疫謂之夾血蓄血消瘀攻下合夾血消瘀解表聯消瘀雖同但蓄血宜下而夾血宜兼解表夾血熱邪初起尚未入於血分故於消瘀中當解表實表法中兼消瘀恐熱與瘀著增其勢也蓄血熱邪並歸於里與血相結故消瘀攻下並施去其附麗者也熱邪入里與血結少腹硬滿蓄血詮喜忘如狂小便利大便光滑黑且堅此蓄血證的據疫邪夾血在初時脈澀或芤舌暗紫胸腹脅肋與四肢按之濡軟痛不止此夾血證的據桃仁紅花歸尾芍赤芍延胡解表方中加味使治夾血用桃仁延胡等一二味加入解表方中若夫治蓄血當分上下焦上焦喜忘如狂或衄血犀角地黃湯好下焦少腹硬滿小便自利如血桃仁承氣湯調辨溫疫夾脾虛疫夾脾虛最難治汗下必兼扶正氣發表人參敗毒散攻裡黃龍湯法宜神情倦怠氣息微面色痿黃耳鳴心悸皆脾虛之見象要知時疫實熱多獨於虛處須留意如通體皆見實象而有一二處虛象則虛象反為吃緊通體見虛象而有一二處實證則實者又為吃緊到此虛實關頭必須留意也辨溫疫夾腎虛疫夾腎虛見機早十中僅許二三好見機早治十許二三救陰猶易陽虛難熱病救陰猶易通陽最難救陰不在補血而在養津以漬汗通陽不在溫補而在化氣以利小便脾腎二虛一不保腎虛感疫若更脾虛胃敗嘔惡呃忒下利湯藥不納者百難救一平日腰痛淋濁遺精腎虛感疫莫遲疑初投表劑加人參白芍平日有腎虛腰疼遺精淋濁等證感受疫邪初時投表散藥中即便加入人參芍藥照顧腎氣之本清裡人參白虎湯施當清必以人參白虎為主攻下黃龍湯合法當下必以黃龍湯為主救陰六味地黃湯宜屢清屢下熱更甚生脈散六味地黃湯二方隨必須大劑方能救杯水車薪難解危屢清屢下而熱更甚舌上燥無苔或有黑苔愈清而愈長或有燥苔愈下而愈燥此係水虧火旺察其陽明無實熱可據當用大劑六味地黃湯壯水之主以制陽光若仍不應合生脈散以滋水源必須大劑與之方克有濟也辨溫疫夾亡血疫夾亡血證有三病前初病病中間先亡血而後患疫清解之中養血參散表清裡藥中步步照顧其陰如生地玉竹人參白芍之類若夫疫病方初起吐衄崩紅忽然至庸師但曉用清滋詎識祛邪血自止神煩躁氣臭穢分明現疫邪舌苔黃白脈數色油垢更無乖雖然亡血休驚怕加減達原飲最佳有疫象可憑雖見亡血之證仍以達原飲為主衄血加山梔茅根吐血加三七丹皮銀花血崩加茜草丹參地榆炭脫血過多須益氣人參加入用無差脫血過多氣欲絕者急用人參更有疫邪深入里傷陰動血血如沸鮮紅為熱紫為瘀犀角地黃湯加味使清熱加黃芩黃連逐瘀加桃仁赤芍便血如注身熱除神昏舌燥為難治生脈散六味地黃湯龜版阿膠峻補真陰救一二熱邪熾盛傷陰便血如注身熱反除而神昏舌燥者最為難治惟有峻補真陰如生脈散六味地黃湯加龜版阿膠等或十中救其一二辨溫疫夾心胃痛附疝氣心痛疝氣本宜溫一感疫邪溫更疼氣色舌苔皆疫象疏通仍宜達原飲君心胃痛與疝氣皆喜溫通如薑桂吳萸之類若一受疫邪發熱仍以達原飲開達膜原若用溫藥反致危殆時疫夾疝但治疫而疝自消若兼心胃痛亦當治時疫為主可於達原飲中加木香蒼朮以開通郁疫邪達而痛即止辨溫疫夾哮喘素患哮喘肺有痰疫邪觸發便生喘一受疫邪其喘便發桑皮栝蔞貝母蘇子前胡豉豆豉解散疫邪消痰喘自安旭高按以上兼證五條夾證十條兼者疫邪兼他邪皆自外來者也夾者疫邪夾內病內外二病併發也
